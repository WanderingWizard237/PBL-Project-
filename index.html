<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRROS Pro Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --text:#e2e8f0;
    --accent:#38bdf8;
}

body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* Sidebar */
.sidebar {
    position: fixed;
    width: 220px;
    height: 100%;
    background: #020617;
    padding: 20px;
}

.sidebar h2 { color: var(--accent); }

.sidebar a {
    display:block;
    color: var(--text);
    margin:15px 0;
    text-decoration:none;
}

.main {
    margin-left:240px;
    padding:20px;
}

.card {
    background: var(--card);
    padding:20px;
    margin:20px 0;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

#map { height:400px; border-radius:10px;}

.incident { padding:10px; border-bottom:1px solid #334155;}

.high { color:#f87171;}
.medium { color:#fbbf24;}
.low { color:#34d399;}

.loader {
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>DRROS</h2>
    <a href="#">Dashboard</a>
    <a href="#">Disasters</a>
    <a href="#">Map</a>
    <a href="#">Analytics</a>
</div>

<div class="main">

<h1>🚀 DRROS Pro Dashboard</h1>

<div class="card">
<h3>🌦 Weather Intelligence</h3>
<div id="weather" class="loader">Loading...</div>
</div>

<div class="card">
<h3>🌍 Live Disasters</h3>
<div id="disasters" class="loader">Loading...</div>
</div>

<div class="card">
<h3>🗺 Disaster Map</h3>
<div id="map"></div>
</div>

<div class="card">
<h3>📊 Analytics</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>🚑 AI Resource Allocation</h3>
<div id="allocation"></div>
</div>

</div>

<script>

// WEATHER
let weatherFactor = 1;

async function weather() {
    let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=28.6&longitude=77.2&current_weather=true");
    let data = await res.json();

    let wind = data.current_weather.windspeed;
    weatherFactor = wind > 25 ? 1.6 : wind > 15 ? 1.3 : 1;

    document.getElementById("weather").innerHTML =
        `Temp: ${data.current_weather.temperature}°C |
         Wind: ${wind} km/h |
         Risk x${weatherFactor}`;
}

// MAP
let map = L.map('map').setView([20,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DISASTERS
async function disasters() {

    let res = await fetch("https://www.gdacs.org/xml/rss.xml");
    let text = await res.text();

    let xml = new DOMParser().parseFromString(text,"text/xml");
    let items = xml.getElementsByTagName("item");

    let dbox = document.getElementById("disasters");
    let abox = document.getElementById("allocation");

    dbox.innerHTML = "";
    abox.innerHTML = "";

    let stats = {High:0,Medium:0,Low:0};

    for(let i=0;i<6;i++) {

        let title = items[i].getElementsByTagName("title")[0].textContent;

        let lat = items[i].getElementsByTagName("geo:lat")[0];
        let lon = items[i].getElementsByTagName("geo:long")[0];

        lat = lat ? parseFloat(lat.textContent) : (Math.random()*140-70);
        lon = lon ? parseFloat(lon.textContent) : (Math.random()*360-180);

        let severity="Low", score=1;

        if(title.includes("Red")) { severity="High"; score=3; }
        else if(title.includes("Orange")) { severity="Medium"; score=2; }

        stats[severity]++;

        let priority = score * weatherFactor;

        let resources =
            priority>4 ? "🚁 Advanced Air Support" :
            priority>2.5 ? "🚑 Medical Teams" :
            "🧑‍🚒 Local Units";

        let div=document.createElement("div");
        div.className=`incident ${severity.toLowerCase()}`;
        div.innerHTML=`${title}<br>Score: ${priority.toFixed(2)}`;
        dbox.appendChild(div);

        L.marker([lat,lon]).addTo(map)
        .bindPopup(`<b>${title}</b><br>${resources}`);

        abox.innerHTML+=`<p>${title}<br>${resources}</p>`;
    }

    chartUpdate(stats);
}

// CHART
let chart;
function chartUpdate(data){
    let ctx=document.getElementById("chart");

    if(chart) chart.destroy();

    chart=new Chart(ctx,{
        type:"doughnut",
        data:{
            labels:["High","Medium","Low"],
            datasets:[{data:[data.High,data.Medium,data.Low]}]
        }
    });
}

// INIT
async function init(){
    await weather();
    await disasters();
}

init();
setInterval(init,60000);

</script>

</body>
</html>
