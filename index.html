<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DRROS Topper Version</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Segoe UI; background:#0f172a; color:white;}
.container { padding:20px; max-width:1200px; margin:auto;}
.card { background:#1e293b; padding:20px; margin:15px 0; border-radius:12px;}
input { padding:10px; margin:5px; }
button { padding:10px; background:#38bdf8; border:none; cursor:pointer;}
#map { height:400px; }
</style>
</head>

<body>

<div class="container">

<h1>🚀 DRROS Topper Dashboard</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>🔐 Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginStatus"></p>
</div>

<div id="dashboard" style="display:none;">

<!-- WEATHER -->
<div class="card">
<h3>🌦 Weather Intelligence</h3>
<div id="weather"></div>
</div>

<!-- DISASTERS -->
<div class="card">
<h3>🌍 Live Disasters</h3>
<div id="disasters"></div>
</div>

<!-- MAP -->
<div class="card">
<h3>🗺 Map</h3>
<div id="map"></div>
</div>

<!-- ANALYTICS -->
<div class="card">
<h3>📊 Trends</h3>
<canvas id="trendChart"></canvas>
</div>

<!-- RESOURCE -->
<div class="card">
<h3>🚑 Smart Allocation</h3>
<div id="allocation"></div>
</div>

</div>

</div>

<script>

// LOGIN SYSTEM (demo)
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u==="admin" && p==="1234"){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("dashboard").style.display="block";
    } else {
        document.getElementById("loginStatus").innerText="Invalid credentials";
    }
}

// WEATHER
let weatherFactor=1;

async function getWeather(){
    let res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=28.6&longitude=77.2&current_weather=true");
    let data=await res.json();

    let wind=data.current_weather.windspeed;
    let temp=data.current_weather.temperature;

    weatherFactor = (wind>20?1.5:1) + (temp>35?0.5:0);

    document.getElementById("weather").innerHTML=
        `Temp: ${temp}°C | Wind: ${wind} km/h | Factor: ${weatherFactor}`;
}

// MAP
let map=L.map('map').setView([20,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// STORAGE (history)
function saveHistory(data){
    let history=JSON.parse(localStorage.getItem("history")||"[]");
    history.push(data);
    if(history.length>10) history.shift();
    localStorage.setItem("history",JSON.stringify(history));
}

// DISASTERS + AI
async function getDisasters(){

    let res=await fetch("https://www.gdacs.org/xml/rss.xml");
    let text=await res.text();

    let xml=new DOMParser().parseFromString(text,"text/xml");
    let items=xml.getElementsByTagName("item");

    let box=document.getElementById("disasters");
    let alloc=document.getElementById("allocation");

    box.innerHTML="";
    alloc.innerHTML="";

    let stats={High:0,Medium:0,Low:0};

    for(let i=0;i<6;i++){

        let title=items[i].getElementsByTagName("title")[0].textContent;

        let severity="Low",score=1;

        if(title.includes("Red")){severity="High";score=3;}
        else if(title.includes("Orange")){severity="Medium";score=2;}

        stats[severity]++;

        // ADVANCED AI LOGIC
        let priority = score * weatherFactor + Math.random();

        let resources=
            priority>4?"🚁 Air + ICU Units":
            priority>2.5?"🚑 Ambulances":
            "🧑‍🚒 Local Teams";

        let div=document.createElement("div");
        div.innerHTML=`${title} | Score: ${priority.toFixed(2)}`;
        box.appendChild(div);

        let lat=Math.random()*140-70;
        let lon=Math.random()*360-180;

        L.marker([lat,lon]).addTo(map)
        .bindPopup(`${title}<br>${resources}`);

        alloc.innerHTML+=`<p>${title}<br>${resources}</p>`;
    }

    saveHistory(stats);
    updateTrend();
}

// TREND GRAPH
let trendChart;

function updateTrend(){
    let history=JSON.parse(localStorage.getItem("history")||"[]");

    let labels=history.map((_,i)=>"T"+i);
    let high=history.map(h=>h.High);

    let ctx=document.getElementById("trendChart");

    if(trendChart) trendChart.destroy();

    trendChart=new Chart(ctx,{
        type:"line",
        data:{
            labels:labels,
            datasets:[{label:"High Severity",data:high}]
        }
    });
}

// INIT
async function init(){
    await getWeather();
    await getDisasters();
}

setInterval(init,60000);

</script>

</body>
</html>
